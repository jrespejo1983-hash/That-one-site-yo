<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXØDUSCORE | Local Service Portal</title>
    <style>
        :root { --accent: #ff3e00; --bg: #0a0a0a; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 2rem; }
        .hero { text-align: center; margin-bottom: 3rem; }
        h1 { letter-spacing: 4px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .card { border: 1px solid #333; padding: 30px; background: #141414; }
        button { background: var(--accent); color: white; border: none; padding: 12px 20px; cursor: pointer; width: 100%; margin-top: 1rem; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

<div class="hero">
    <h1>VEXØDUSCORE</h1>
    <p>Connecting homeowners in East Milton & Navarre with verified pros.</p>
</div>

<main class="grid">
    <!-- Customer Side -->
    <div class="card">
        <h2>Need Service?</h2>
        <input type="text" placeholder="What service do you need?">
        <input type="text" placeholder="Your Zip Code">
        <button onclick="alert('Request sent to local pros!')">Find a Vendor</button>
    </div>

    <!-- Vendor Side -->
    <div class="card">
        <h2>Become a VEXØDUSCORE Vendor</h2>
        <p>Get high-intent leads sent directly to your phone.</p>
        <button onclick="window.location.href='YOUR_STRIPE_SUBSCRIPTION_LINK'">Start Subscription ($X/mo)</button>
    </div>
</main>

</body>
</html>

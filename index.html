<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VEXØDUS AI | Intelligent Interface</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #212529;
            --accent: #4a90e2; /* Softer, professional blue */
            --border: #e9ecef;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; 
            line-height: 1.6; margin: 0; display: flex; 
            justify-content: center; padding: 40px 20px;
        }
        .container { 
            width: 100%; max-width: 700px; 
            background: var(--surface); padding: 40px; 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; }
        #chat-window { min-height: 300px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; border: 2px solid var(--border); 
            border-radius: 8px; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 6px; }
        .ai-msg { background: #f1f3f5; }
    </style>
</head>
<body>

<div class="container">
    <h1>VEXØDUS AI</h1>
    <p>Professional. Precise. At your service.</p>
    <div id="chat-window"></div>
    <input type="text" id="cli" placeholder="How can I assist you today?">
</div>

<script>
    const cli = document.getElementById('cli');
    const chat = document.getElementById('chat-window');

    cli.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = cli.value;
            chat.innerHTML += `<div class="message"><b>You:</b> ${val}</div>`;
            
            // Welcoming AI response
            setTimeout(() => {
                chat.innerHTML += `<div class="message ai-msg">VEXØDUS: I've processed your request. How else can I assist your workflow?</div>`;
            }, 600);
            
            cli.value = '';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEUCE CREW | Operation Engine</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; }
        .nav { padding: 2rem; border-bottom: 1px solid #333; font-weight: bold; }
        .container { max-width: 900px; margin: auto; padding: 2rem; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { border: 1px solid #333; padding: 2rem; background: #111; }
        input, select, button { width: 100%; padding: 1rem; margin: 0.5rem 0; background: #222; border: 1px solid #444; color: white; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav">DEUCE_CREW // SYSTEM OPERATIONAL</div>
    <div class="container">
        <h1>COMMAND CENTER</h1>
        <div class="dashboard-grid">
            <!-- Lead Engine -->
            <div class="card" id="lead-engine">
                <h3>CLIENT INTAKE</h3>
                <input type="text" placeholder="Full Name" id="name">
                <input type="text" placeholder="Service Address" id="address">
                <select id="service-type">
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial/HOA</option>
                </select>
                <button onclick="submitLead()">REQUEST SERVICE</button>
            </div>
            <!-- Operations Status -->
            <div class="card">
                <h3>SYSTEM STATUS</h3>
                <p>Status: <b>ACTIVE</b></p>
                <p>Route Density: <b>OPTIMIZED</b></p>
                <p>Payment Gateway: <b>LINKED</b></p>
                <a href="YOUR_JOBBER_PORTAL_LINK" style="color:var(--gold)">Launch Full Client Hub</a>
            </div>
        </div>
    </div>
    <script>
        function submitLead() {
            const name = document.getElementById('name').value;
            alert("Lead captured: " + name + ". Data syncing to CRM.");
        }
    </script>
</body>
</html>

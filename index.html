<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARANORMAL OPS | FIELD HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle, #0a1a0a 0%, #000000 100%); color: #22c55e; }
        .glitch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/noise-lines.png'); opacity: 0.05; pointer-events: none; z-index: 10; }
        .hud-border { border: 1px solid #14532d; }
        .nosifer { font-family: 'Nosifer', cursive; text-shadow: 0 0 15px #22c55e; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">
    <div class="glitch-overlay"></div>

    <header class="p-8 border-b border-green-900 flex justify-between items-center z-20 relative">
        <h1 class="text-4xl nosifer tracking-widest">PARANORMAL OPS</h1>
        <nav class="space-x-8 orbitron">
            <button onclick="nav('map')" class="hover:text-white transition">INVESTIGATION MAP</button>
            <button onclick="nav('vault')" class="hover:text-white transition">EVIDENCE VAULT</button>
        </nav>
    </header>

    <main id="app" class="p-10 max-w-6xl mx-auto z-20 relative">
        <section id="map">
            <h2 class="text-2xl orbitron mb-6">// ACTIVE SECTOR SCAN</h2>
            <div class="w-full h-96 hud-border bg-gray-900 flex items-center justify-center opacity-80 hover:opacity-100 transition duration-500">
                <p class="text-green-800 animate-pulse">[SYSTEM: AWAITING COORDINATES...]</p>
            </div>
        </section>

        <section id="vault" class="hidden">
            <h2 class="text-2xl orbitron mb-6">// CLASSIFIED EVIDENCE LOG</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="hud-border p-6 hover:bg-green-900/20 cursor-pointer transition">
                    <h3 class="font-bold">EVT-001: EVP RECORDING</h3>
                    <p class="text-sm text-green-700 mt-2">Location: Abandoned Asylum</p>
                </div>
                <div class="hud-border p-6 hover:bg-green-900/20 cursor-pointer transition">
                    <h3 class="font-bold">EVT-002: EMF ANOMALY</h3>
                    <p class="text-sm text-green-700 mt-2">Location: Residential Site B</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function nav(id) {
            document.getElementById('map').classList.add('hidden');
            document.getElementById('vault').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
        
        // Ghostly log effect
        setInterval(() => {
            console.log(`%c[SYSTEM] EMF Fluctuating...`, "color: #22c55e; font-family: monospace;");
        }, 5000);
    </script>
</body>
</html>

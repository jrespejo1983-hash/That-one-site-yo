<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Landscapes | Premier Outdoor Design in Santa Rosa County</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('YOUR_HERO_IMAGE.jpg'); background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="h-screen hero-bg flex flex-col justify-center items-center text-center p-6 text-white">
        <h1 data-aos="zoom-in" class="text-6xl md:text-9xl font-extrabold uppercase tracking-tighter">Elysium Landscapes</h1>
        <p data-aos="fade-up" data-aos-delay="300" class="text-2xl md:text-4xl font-light italic mt-6">Defining Outdoor Luxury in Milton, Pace & Navarre</p>
        <a href="#quote" class="mt-12 bg-emerald-600 hover:bg-emerald-500 px-12 py-5 rounded-full font-bold text-lg transition shadow-2xl">Begin Your Transformation</a>
    </header>

    <section class="py-24 px-6 max-w-7xl mx-auto">
        <h2 class="text-5xl font-bold text-center mb-20">Our Signature Services</h2>
        <div class="grid md:grid-cols-3 gap-10">
            <div data-aos="fade-up" class="group cursor-pointer">
                <div class="h-80 bg-slate-200 rounded-3xl mb-6 overflow-hidden shadow-lg group-hover:scale-105 transition-transform"><img src="DESIGN_IMAGE.jpg" class="w-full h-full object-cover"></div>
                <h3 class="text-2xl font-bold">Landscape Architecture</h3>
            </div>
            <div data-aos="fade-up" data-aos-delay="200" class="group cursor-pointer">
                <div class="h-80 bg-slate-200 rounded-3xl mb-6 overflow-hidden shadow-lg group-hover:scale-105 transition-transform"><img src="HARDSCAPE_IMAGE.jpg" class="w-full h-full object-cover"></div>
                <h3 class="text-2xl font-bold">Hardscape Engineering</h3>
            </div>
            <div data-aos="fade-up" data-aos-delay="400" class="group cursor-pointer">
                <div class="h-80 bg-slate-200 rounded-3xl mb-6 overflow-hidden shadow-lg group-hover:scale-105 transition-transform"><img src="MAINTENANCE_IMAGE.jpg" class="w-full h-full object-cover"></div>
                <h3 class="text-2xl font-bold">Estate Maintenance</h3>
            </div>
        </div>
    </section>

    <section id="quote" class="py-24 bg-slate-900 text-white px-6">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-5xl font-bold mb-12 text-center">Consultation Request</h2>
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="space-y-6">
                <input type="text" name="name" placeholder="Full Name" required class="w-full p-5 rounded-xl bg-slate-800 border border-slate-700 text-white">
                <div class="grid md:grid-cols-2 gap-4">
                    <label class="flex items-center p-4 bg-slate-800 rounded-xl border border-slate-700 cursor-pointer hover:border-emerald-500"><input type="checkbox" name="service" value="Design" class="mr-3"> Design</label>
                    <label class="flex items-center p-4 bg-slate-800 rounded-xl border border-slate-700 cursor-pointer hover:border-emerald-500"><input type="checkbox" name="service" value="Hardscape" class="mr-3"> Hardscape</label>
                </div>
                <textarea name="message" placeholder="Describe your vision..." class="w-full p-5 h-40 rounded-xl bg-slate-800 border border-slate-700 text-white"></textarea>
                <button type="submit" class="w-full bg-emerald-600 py-6 rounded-xl font-bold text-xl hover:bg-emerald-500 transition">Request Consultation</button>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-500">
        <p>&copy; 2026 Elysium Landscapes | Milton, Pace, Navarre, FL</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>

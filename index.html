<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE SANCTUARY | MYEXCLUSIVEARSENAL</title>
    <style>
        :root { --gold: #d4af37; --bg: #030405; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }

        /* The Breathing Pulse Background */
        #aura { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(80px); animation: breathe 8s infinite alternate; z-index: 0; }
        @keyframes breathe { from { transform: scale(0.8); opacity: 0.3; } to { transform: scale(1.2); opacity: 0.6; } }

        .container { z-index: 1; display: grid; grid-template-columns: repeat(2, 300px); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; backdrop-filter: blur(30px); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .card:hover { transform: scale(1.05); border-color: var(--gold); background: rgba(255,255,255,0.06); }
        h1 { color: var(--gold); margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="aura"></div>

    <main class="container">
        <section class="card" onclick="alert('Accessing the inner archives...')">
            <h1>The Portal</h1>
            <p>Step into silence.</p>
        </section>
        <section class="card" onclick="document.body.style.filter = 'invert(1)'">
            <h1>The Shift</h1>
            <p>See the world anew.</p>
        </section>
        <section class="card" onclick="window.location.reload()">
            <h1>The Flow</h1>
            <p>Sync with the cycle.</p>
        </section>
        <section class="card" id="time-card">
            <h1>The Current</h1>
            <p id="clock">Loading...</p>
        </section>
    </main>

    <script>
        // Interactive Clock for "The Current"
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Mouse Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const aura = document.getElementById('aura');
            aura.style.left = (e.clientX - 300) + 'px';
            aura.style.top = (e.clientY - 300) + 'px';
        });
    </script>
</body>
</html>

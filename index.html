<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEXØDUS // TITAN CORE OPERATIONS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');
    body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
      <span class="text-lg font-black tracking-tighter text-white">VEXØDUS<span class="text-slate-600">.CORE</span></span>
    </div>
    <div class="text-[10px] text-slate-500 mono uppercase tracking-widest">Global Deploy: 30 Units Active</div>
  </header>

  <main class="max-w-7xl mx-auto p-6 md:p-12">
    <!-- CONFIGURATION -->
    <section class="glass p-8 rounded-xl mb-12">
      <h2 class="text-xs font-bold text-amber-500 mb-6 uppercase tracking-widest">Global Configuration Panel</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <input type="text" id="brand-name" placeholder="Brand Identity" class="bg-slate-900 border border-slate-800 p-3 text-sm text-white w-full rounded">
        <input type="text" id="brand-phone" placeholder="(850) 483-9102" class="bg-slate-900 border border-slate-800 p-3 text-sm text-white w-full rounded">
        <button onclick="updateAll()" class="bg-amber-500 text-black font-black uppercase text-xs py-3 rounded hover:bg-amber-400 transition">Update All Units</button>
      </div>
    </section>

    <!-- UNIT GRID -->
    <div id="unit-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
  </main>

  <script>
    const niches = ["Roofing", "Detailing", "Landscaping", "Pet Waste", "HVAC", "Painting", "Fitness", "Cafe", "Real Estate", "Moving", "Pool Service", "Security", "Pest Control", "Electrician", "Pressure Wash", "Handyman", "Window Clean", "Roof Clean", "Auto Repair", "Junk Removal", "Carpet Clean", "Gutter Repair", "Tree Service", "Flooring", "Fence Install", "Drywall", "Appliance Repair", "Solar Install", "Foundation", "Snow Removal"];
    
    function renderGrid() {
      const grid = document.getElementById('unit-grid');
      grid.innerHTML = niches.map((n, i) => `
        <div class="glass p-5 rounded-lg border border-slate-800 hover:border-amber-500 transition-all group">
          <div class="text-[9px] mono text-slate-600 mb-4">UNIT_${String(i+1).padStart(2, '0')}</div>
          <div class="text-sm font-black uppercase text-white mb-1 name-field">Titan Core Ops</div>
          <div class="text-[10px] font-bold text-amber-500 mb-4 uppercase">${n}</div>
          <div class="text-[10px] mono text-slate-400 phone-field">(850) 483-9102</div>
        </div>
      `).join('');
    }

    function updateAll() {
      const name = document.getElementById('brand-name').value || "Titan Core Ops";
      const phone = document.getElementById('brand-phone').value || "(850) 483-9102";
      document.querySelectorAll('.name-field').forEach(el => el.textContent = name);
      document.querySelectorAll('.phone-field').forEach(el => el.textContent = phone);
    }

    renderGrid();
  </script>
</body>
</html>

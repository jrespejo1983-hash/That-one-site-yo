<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A E T H E R I S | Digital Sanctuary</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1 { font-weight: 200; font-size: 3rem; letter-spacing: 0.8em; margin: 0; cursor: default; }
        .menu { margin-top: 40px; display: flex; gap: 20px; }
        a { border: 1px solid rgba(255,255,255,0.2); padding: 12px 24px; color: white; text-decoration: none; text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.3em; transition: 0.3s; }
        a:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>A E T H E R I S</h1>
        <div class="menu">
            <a href="#" id="audio-btn">Initialize Audio</a>
            <a href="https://buy.stripe.com/your-payment-link-here" target="_blank">Support the Flow</a>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // Setup Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // Animation
        function animate() {
            ctx.fillStyle = 'rgba(5,5,5,0.08)';
            ctx.fillRect(0,0,w,h);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.arc(w/2, h/2, Math.sin(Date.now()/1000)*100 + 150, 0, Math.PI*2);
            ctx.stroke();
            requestAnimationFrame(animate);
        }
        animate();

        // Audio Handler
        const btn = document.getElementById('audio-btn');
        btn.onclick = (e) => {
            e.preventDefault();
            alert("To host your music, upload your file to your GitHub repo and link it here.");
        };
    </script>
</body>
</html>

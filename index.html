<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Landscapes | Professional Garden Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="h-screen flex flex-col justify-center items-center text-center p-6 bg-cover bg-center" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('your-landscape-image.jpg');">
        <h1 data-aos="fade-up" class="text-5xl md:text-7xl text-white font-bold mb-4">Elysium Landscapes</h1>
        <p data-aos="fade-up" data-aos-delay="200" class="text-xl text-white mb-8">Transforming Nature, One Landscape at a Time</p>
        <a href="#contact" class="bg-emerald-600 text-white px-8 py-3 rounded-full hover:bg-emerald-700 transition">Get a Free Estimate</a>
    </header>

    <section id="contact" class="py-20 max-w-2xl mx-auto px-6">
        <h2 data-aos="fade-up" class="text-3xl font-bold text-center mb-10">Contact Us</h2>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Name" required class="w-full p-4 border border-gray-300 rounded">
            <input type="email" name="email" placeholder="Email*" required class="w-full p-4 border border-gray-300 rounded">
            <textarea name="message" placeholder="Tell us about your project" class="w-full p-4 border border-gray-300 rounded h-32"></textarea>
            <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded font-bold hover:bg-emerald-700">Send Message</button>
        </form>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>

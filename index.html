<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX & AETHER | Premium DTF Transfers</title>
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        :root { --bg: #050505; --text: #ffffff; --accent: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; overflow-x: hidden; }
        
        nav { padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 90%; z-index: 100; }
        .logo { font-weight: 800; letter-spacing: 4px; font-size: 1.5rem; }
        
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 6rem; margin: 0; text-transform: uppercase; line-height: 0.9; }
        .hero p { opacity: 0.6; margin-top: 1rem; }
        
        .section { padding: 100px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 50px; }
        .card { background: #0c0c0c; border: 1px solid #222; padding: 2rem; transition: 0.3s; }
        .card:hover { border-color: #555; }
        
        footer { padding: 50px 5%; text-align: center; font-size: 0.8rem; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ONYX & AETHER</div>
        <div>Menu</div>
    </nav>

    <header class="hero">
        <h1 id="title">ONYX & AETHER</h1>
        <p>Precision-engineered DTF transfers for the modern creator.</p>
    </header>

    <section class="section" id="collection">
        <h2>Premade Collection</h2>
        <div class="grid">
            <div class="card"><h3>Phonk Essence</h3><p>High-fidelity vibrant print.</p></div>
            <div class="card"><h3>Midnight R&B</h3><p>Deep blacks, soft matte finish.</p></div>
            <div class="card"><h3>Urban Ghost</h3><p>Streetwear ready transfers.</p></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 ONYX & AETHER | <a href="#" style="color:#666">Terms</a> | <a href="#" style="color:#666">Privacy</a></p>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Entrance Animation
        gsap.from("#title", { duration: 1.8, opacity: 0, y: 100, ease: "power4.out" });
        gsap.from(".hero p", { duration: 1, opacity: 0, delay: 0.5 });

        // Scroll Animation
        gsap.utils.toArray(".card").forEach((card) => {
            gsap.from(card, {
                scrollTrigger: { trigger: card, start: "top 80%" },
                opacity: 0,
                y: 50,
                duration: 1
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Landscape | Paradise in Pace, Milton & Navarre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fcfbf7; color: #3d2a3d; }
        .bg-plum { background-color: #5b2c48; }
        .bg-navy { background-color: #0b2d3d; }
        .text-plum { color: #5b2c48; }
    </style>
</head>
<body>

    <nav class="max-w-7xl mx-auto flex items-center justify-between p-6 relative">
        <img src="logo.png" alt="Elysium Landscape Logo" class="h-24">
        
        <button id="menu-btn" class="md:hidden text-3xl text-plum">☰</button>

        <div id="menu" class="hidden md:flex md:space-x-8 font-semibold text-plum absolute md:static top-20 right-6 bg-white md:bg-transparent p-6 md:p-0 shadow-lg md:shadow-none rounded-lg z-50">
            <a href="#services" class="block py-2 hover:underline">Services</a>
            <a href="#portfolio" class="block py-2 hover:underline">Portfolio</a>
            <a href="#about" class="block py-2 hover:underline">About</a>
        </div>
    </nav>

    <script>
        // Toggle menu visibility
        const menuBtn = document.getElementById('menu-btn');
        const menu = document.getElementById('menu');
        menuBtn.addEventListener('click', () => { menu.classList.toggle('hidden'); });
    </script>

    <header class="max-w-7xl mx-auto px-6 text-center">
        <img src="hero-garden.jpg" alt="Landscape" class="w-full h-[400px] object-cover rounded-xl shadow-lg">
        <div class="py-10">
            <h1 class="text-5xl font-bold italic text-plum">Transform Your Outdoor Oasis</h1>
            <p class="text-2xl mt-4 font-medium">Elysium Landscape: Crafting Paradise in Pace, Milton & Navarre</p>
        </div>
    </header>

    </body>
</html>

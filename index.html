<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Landscapes | Milton, Pace, Navarre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fcfbf7; color: #2d1b2d; }
        .text-plum { color: #5b2c48; }
        .bg-plum { background-color: #5b2c48; }
        .bg-navy { background-color: #0b2d3d; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between p-6 max-w-7xl mx-auto">
        <img src="YOUR_LOGO.png" class="h-16">
        <div class="space-x-6 hidden md:block font-semibold">
            <a href="#" class="hover:text-plum">Services</a>
            <a href="#" class="hover:text-plum">Portfolio</a>
            <a href="#" class="hover:text-plum">Drop us</a>
            <a href="#" class="bg-plum text-white px-5 py-2 rounded-full">Contact</a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6">
        <img src="YOUR_HERO_IMAGE.jpg" class="w-full h-[500px] object-cover rounded-xl shadow-lg">
        <div class="text-center py-12">
            <h1 class="text-5xl font-bold mb-4">Transforming Nature, One Landscape at a Time</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 py-12">
        <div>
            <h2 class="text-4xl font-bold mb-8">The Elysium Experience</h2>
            <div class="space-y-8">
                <div class="flex gap-4">
                    <img src="icon-tree.png" class="w-12 h-12">
                    <div><h3 class="text-2xl font-bold">Native Design</h3><p>Custom designs for Santa Rosa County.</p></div>
                </div>
                <div class="flex gap-4">
                    <img src="icon-stone.png" class="w-12 h-12">
                    <div><h3 class="text-2xl font-bold">Hardscaping</h3><p>Patios, walks, and retaining walls.</p></div>
                </div>
            </div>
        </div>
        <div class="space-y-6">
            <img src="YOUR_SIDE_IMAGE.jpg" class="rounded-xl shadow-lg">
            <div class="bg-navy text-white p-10 rounded-xl text-center">
                <p class="text-3xl font-bold">850-208-2229</p>
                <p class="text-xl my-4 uppercase">Text or call for a free quote</p>
                <p class="font-bold border-t pt-4">Licensed & Insured</p>
            </div>
        </div>
    </main>

    <section class="max-w-3xl mx-auto p-12 bg-white rounded-xl shadow-sm mb-20">
        <h2 class="text-4xl font-bold mb-8">Drop us a line!</h2>
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Name" class="w-full p-4 border rounded">
            <input type="email" name="email" placeholder="Email*" class="w-full p-4 border rounded">
            <textarea name="message" placeholder="Message" class="w-full p-4 border rounded h-32"></textarea>
            <button class="bg-plum text-white px-8 py-3 rounded">Send</button>
        </form>
    </section>

</body>
</html>

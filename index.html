<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyExclusiveArsenal | Paranormal Field Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Orbitron', sans-serif; }
        .arsenal-card { border: 1px solid #004400; background: rgba(0, 20, 0, 0.4); transition: 0.3s; }
        .arsenal-card:hover { border-color: #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .glitch { font-family: 'Nosifer', cursive; text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <header class="mb-12 border-b border-green-900 pb-6">
        <h1 class="text-5xl glitch tracking-widest uppercase">MyExclusiveArsenal</h1>
        <p class="text-sm mt-2 tracking-[0.3em] opacity-70">// FIELD EQUIPMENT & PARANORMAL EVIDENCE</p>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <!-- Equipment Card 1: EMF Meter -->
        <div class="arsenal-card p-6">
            <h2 class="text-xl font-bold mb-2">EMF DETECTOR M-500</h2>
            <p class="text-xs text-green-700 mb-4">STATUS: CALIBRATED</p>
            <div class="w-full h-32 bg-black border border-green-900 flex items-center justify-center">
                <span class="animate-pulse">0.2 mG</span>
            </div>
        </div>

        <!-- Equipment Card 2: Thermal Imaging -->
        <div class="arsenal-card p-6">
            <h2 class="text-xl font-bold mb-2">THERMAL IMAGER</h2>
            <p class="text-xs text-green-700 mb-4">STATUS: ONLINE</p>
            <div class="w-full h-32 bg-black border border-green-900 flex items-center justify-center">
                <span class="text-blue-400">72.4 °F</span>
            </div>
        </div>

        <!-- Equipment Card 3: EVP Vault -->
        <div class="arsenal-card p-6 col-span-1 lg:col-span-1">
            <h2 class="text-xl font-bold mb-2">EVP VAULT</h2>
            <p class="text-xs text-green-700 mb-4">STATUS: 14 RECORDS</p>
            <button class="w-full py-2 border border-green-600 hover:bg-green-600 hover:text-black transition">ACCESS ARCHIVE</button>
        </div>

    </main>

    <footer class="mt-20 pt-10 border-t border-green-900 text-center text-xs opacity-50">
        &copy; 2026 MYEXCLUSIVEARSENAL | ESTABLISHED FOR INVESTIGATIVE EXCELLENCE
    </footer>

</body>
</html>

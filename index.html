<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --accent: #00ffcc; }
        body, html { margin: 0; height: 100%; overflow: hidden; background: #050505; color: white; font-family: 'Inter', sans-serif; }
        
        /* Animated Background */
        .bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #000, #111);
            z-index: -1;
        }
        .grid-overlay {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1;
            animation: moveGrid 20s linear infinite;
        }
        @keyframes moveGrid { from { transform: translateY(0); } to { transform: translateY(50px); } }

        /* The Interface */
        .console {
            position: relative; width: 80%; max-width: 800px; margin: 10vh auto;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--accent);
            color: white; padding: 15px; font-size: 1.2rem; outline: none;
        }
    </style>
</head>
<body>
    <div class="bg"><div class="grid-overlay"></div></div>
    
    <div class="console">
        <h1 style="text-transform: uppercase; letter-spacing: 5px;">VEXØDUS // AI</h1>
        <p style="color: var(--accent);">SYSTEM OPERATIONAL. AWAITING INPUT.</p>
        <div id="output" style="height: 300px; overflow-y: auto; margin: 20px 0;"></div>
        <input type="text" id="cli" placeholder=">_">
    </div>

    <script>
        const cli = document.getElementById('cli');
        cli.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                document.getElementById('output').innerHTML += `<div>> ${cli.value}</div>`;
                cli.value = '';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MYEXCLUSIVEARSENAL // DIGITAL ASSETS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .unit-card { border: 1px solid #222; background: #0a0a0a; transition: 0.3s; }
    .unit-card:hover { border: 1px solid #eab308; }
  </style>
</head>
<body class="p-10">

  <header class="max-w-6xl mx-auto mb-20">
    <h1 class="text-6xl font-black uppercase tracking-tighter">MY<span class="text-yellow-500">EXCLUSIVE</span>ARSENAL</h1>
    <p class="text-gray-500 uppercase tracking-widest text-xs mt-4">Premium web templates. Instant deployment.</p>
  </header>

  <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="catalog"></main>

  <script>
    // FILL THIS IN: Replace '#' with your actual Gumroad/LemonSqueezy links
    const assets = Array.from({length: 30}, (_, i) => ({
      id: String(i + 1).padStart(2, '0'),
      link: "#" 
    }));

    document.getElementById('catalog').innerHTML = assets.map(a => `
      <div class="unit-card p-4">
        <div class="h-40 bg-gray-900 mb-4 flex items-center justify-center text-[10px] text-gray-700">PREVIEW IMAGE</div>
        <div class="flex justify-between items-end">
          <div>
            <div class="text-[9px] text-yellow-600 font-mono">UNIT_${a.id}</div>
            <div class="font-bold text-sm">Design Edition ${a.id}</div>
          </div>
          <a href="${a.link}" class="bg-yellow-500 text-black px-4 py-2 text-[9px] font-black uppercase hover:bg-yellow-400">Buy Now</a>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>

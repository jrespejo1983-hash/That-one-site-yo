<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VEXØDUS AI</title>
    <style>
        :root {
            --bg: #000000;
            --border: #333333;
            --text: #ffffff;
            --accent: #ff3300; /* High-contrast industrial red */
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            box-sizing: border-box;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .brand { font-weight: 800; letter-spacing: 0.1rem; font-size: 1.2rem; }
        #terminal {
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #aaa;
        }
        .input-zone {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            font-family: 'Courier New', monospace;
        }
        input::placeholder { color: #333; }
    </style>
</head>
<body>

    <header>
        <div class="brand">VEXØDUS // AI</div>
        <div style="font-size: 0.7rem;">STATUS: ONLINE</div>
    </header>

    <div id="terminal">
        > VEXØDUS system initialized... <br>
        > Waiting for input...
    </div>

    <div class="input-zone">
        <input type="text" id="cli" placeholder=">_ Enter command or query" autofocus>
    </div>

    <script>
        const cli = document.getElementById('cli');
        const terminal = document.getElementById('terminal');

        cli.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = cli.value;
                terminal.innerHTML += `<br>> ${query}`;
                cli.value = '';
                // Integration point for your VEXØDUS backend
            }
        });
    </script>
</body>
</html>

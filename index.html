<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEUCE CREW | Professional Waste Removal</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { width: 100%; padding: 2rem; text-align: center; font-weight: bold; letter-spacing: 4px; border-bottom: 1px solid #333; }
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 500px; text-align: center; }
        .quote-box { background: #111; padding: 2rem; border: 1px solid #333; width: 100%; border-radius: 4px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { background: var(--gold); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }
        .cta-btn { background: var(--gold); color: #000; padding: 15px; display: block; text-decoration: none; font-weight: bold; margin-top: 10px; }
        footer { padding: 2rem; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

    <nav>DEUCE_CREW</nav>

    <div class="hero">
        <h1>CLEAN YARDS.<br>ZERO TRACE.</h1>
        
        <div id="quoteSection" class="quote-box">
            <h3>INSTANT QUOTE</h3>
            <input type="number" id="dogs" placeholder="Number of Dogs" min="1">
            <select id="freq">
                <option value="15">Weekly ($15/visit)</option>
                <option value="20">Bi-Weekly ($20/visit)</option>
            </select>
            <button onclick="calculate()">GET PRICE</button>
        </div>

        <div id="bookingSection" class="hidden quote-box">
            <h2 id="priceDisplay"></h2>
            <p>Ready to get started?</p>
            <a href="YOUR_JOBBER_LINK_HERE" class="cta-btn">CONFIRM & BOOK</a>
            <button onclick="location.reload()" style="background:transparent; color:#777; border:1px solid #333; margin-top:10px;">RESET</button>
        </div>
    </div>

    <footer>&copy; 2026 DEUCE CREW | SERVING EAST MILTON</footer>

    <script>
        function calculate() {
            const dogs = document.getElementById('dogs').value;
            const freq = document.getElementById('freq').value;
            if(!dogs) return alert('Please enter number of dogs');
            const total = dogs * freq;
            document.getElementById('quoteSection').classList.add('hidden');
            document.getElementById('bookingSection').classList.remove('hidden');
            document.getElementById('priceDisplay').innerText = `$${total} per visit`;
        }
    </script>
</body>
</html>
